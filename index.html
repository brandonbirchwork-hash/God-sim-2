<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>God Sim - Clean Base</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui">Loading simulation...</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ======================
// WORLD
// ======================
const size = 60;
const tile = 12;

let food = [];

// generate food grid
for (let y = 0; y < size; y++) {
  let row = [];
  for (let x = 0; x < size; x++) {
    row.push(Math.random() < 0.2 ? 5 : 0);
  }
  food.push(row);
}

// ======================
// ENTITY
// ======================
let x = 20;
let y = 20;
let energy = 30;

// movement helper
function moveTowardFood() {
  let bestX = x;
  let bestY = y;
  let bestFood = food[y][x];

  let dirs = [
    [1,0],[-1,0],[0,1],[0,-1]
  ];

  for (let d of dirs) {
    let nx = x + d[0];
    let ny = y + d[1];

    if (nx < 0 || ny < 0 || nx >= size || ny >= size) continue;

    if (food[ny][nx] > bestFood) {
      bestFood = food[ny][nx];
      bestX = nx;
      bestY = ny;
    }
  }

  x = bestX;
  y = bestY;
}

// ======================
// LOOP
// ======================
function loop() {

  ctx.fillStyle = "black";

  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 🔋 ENERGY ALWAYS DECREASES

  energy -= 0.03;

  // 👣 MOVEMENT ALWAYS RUNS FIRST

  x += 1;

  // ☠️ RESET ONLY AFTER MOVEMENT

  if (energy <= 0 || x > canvas.width) {

    x = 50;

    y = 50;

    energy = 20;

  }

  // 🎨 DRAW ENTITY

  ctx.fillStyle = "white";

  ctx.fillRect(x,y,10,10);

  // 📊 UI

  document.getElementById("ui").innerText =

`God Sim - Food System

Energy: ${energy.toFixed(1)}

Position: (${x.toFixed(0)}, ${y.toFixed(0)})`;

  requestAnimationFrame(loop);

}

loop();
</script>

</body>
</html>
