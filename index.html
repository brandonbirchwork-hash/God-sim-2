<!DOCTYPE html>
<html>
<body>

<canvas id="c"></canvas>
<div id="ui">Loading...</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ======================
// ENTITY SYSTEM
// ======================
let entities = [];

for (let i = 0; i < 30; i++) {
  entities.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    energy: 20 + Math.random() * 20,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 0.5) * 2
  });
}

// ======================
// LOOP
// ======================
function loop() {

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let e of entities) {

    // movement
    e.x += e.vx;
    e.y += e.vy;

    // bounce off walls
    if (e.x < 0 || e.x > canvas.width) e.vx *= -1;
    if (e.y < 0 || e.y > canvas.height) e.vy *= -1;

    // energy drain
    e.energy -= 0.05;

    // death + reset
    if (e.energy <= 0) {
      e.x = Math.random() * canvas.width;
      e.y = Math.random() * canvas.height;
      e.energy = 20 + Math.random() * 20;
    }

    // draw entity
    ctx.fillStyle = "white";
    ctx.fillRect(e.x, e.y, 5, 5);
  }

  // UI
  document.getElementById("ui").innerText =
`God Sim - Multi Entity

Population: ${entities.length}
Sample Energy: ${entities[0].energy.toFixed(1)}`;

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
