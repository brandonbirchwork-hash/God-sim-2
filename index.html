<!DOCTYPE html>
<html>
<body>

<canvas id="c"></canvas>
<div id="ui">Loading...</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ======================
// WORLD FOOD GRID
// ======================
const gridSize = 80;
const tile = 8;

let food = [];

for (let y = 0; y < gridSize; y++) {
  let row = [];
  for (let x = 0; x < gridSize; x++) {
    row.push(Math.random() < 0.15 ? 8 : 0);
  }
  food.push(row);
}

// ======================
// ENTITIES
// ======================
let entities = [];

for (let i = 0; i < 25; i++) {
  entities.push({
    x: Math.floor(Math.random() * gridSize),
    y: Math.floor(Math.random() * gridSize),
    energy: 20 + Math.random() * 20
  });
}

// ======================
// MOVE TOWARD FOOD
// ======================
function move(e) {
  let dirs = [[1,0],[-1,0],[0,1],[0,-1]];

  let bestX = e.x;
  let bestY = e.y;
  let bestFood = food[e.y][e.x];

  for (let d of dirs) {
    let nx = e.x + d[0];
    let ny = e.y + d[1];

    if (nx < 0 || ny < 0 || nx >= gridSize || ny >= gridSize) continue;

    if (food[ny][nx] > bestFood) {
      bestFood = food[ny][nx];
      bestX = nx;
      bestY = ny;
    }
  }

  e.x = bestX;
  e.y = bestY;
}

// ======================
// LOOP
// ======================
function loop() {

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // draw food
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {

      ctx.fillStyle = food[y][x] > 0 ? "#2ecc71" : "#0b2a4a";
      ctx.fillRect(x * tile, y * tile, tile, tile);
    }
  }

  for (let e of entities) {

    // energy drain
    e.energy -= 0.05;

    // eat food
    if (food[e.y][e.x] > 0) {
      e.energy += 1;
      food[e.y][e.x] -= 0.4;
    }

    // movement
    move(e);

    // death + respawn
    if (e.energy <= 0) {
      e.x = Math.floor(Math.random() * gridSize);
      e.y = Math.floor(Math.random() * gridSize);
      e.energy = 20 + Math.random() * 20;
    }

    // draw entity
    ctx.fillStyle = "white";
    ctx.fillRect(e.x * tile, e.y * tile, tile, tile);
  }

  document.getElementById("ui").innerText =
`God Sim - Food Ecosystem

Population: ${entities.length}
Food cells active: ${food.flat().filter(f => f > 0).length}`;

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
