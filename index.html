<!DOCTYPE html>
<html>
<body>

<canvas id="c"></canvas>
<div id="ui">Loading...</div>

<script>const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ======================
// WORLD
// ======================
const gridSize = 80;
const tile = 8;

let food = [];

for (let y = 0; y < gridSize; y++) {
  let row = [];
  for (let x = 0; x < gridSize; x++) {
    row.push(Math.random() < 0.25 ? 8 : 0);
  }
  food.push(row);
}

// ======================
// ENTITIES (IMPORTANT: persistent array)
// ======================
let entities = [];
let selected = null;
function spawnEntity(x, y, energy = 20) {

  const names = [
    "Adam","Eve","Noah","Sarah",
    "John","Mary","David","Rachel",
    "James","Anna","Luke","Leah"
  ];

  return {
    name: names[Math.floor(Math.random()*names.length)],
    sex: Math.random() < 0.5 ? "Male" : "Female",
    age: 0,
    children: 0,

    x,
    y,
    energy
  };
}
canvas.addEventListener("click", (event) => {

  const rect = canvas.getBoundingClientRect();

  const mouseX = event.clientX - rect.left;
  const mouseY = event.clientY - rect.top;

  selected = null;

  for (let e of entities) {

    let ex = e.x * tile;
    let ey = e.y * tile;

    if (
      mouseX >= ex &&
      mouseX <= ex + tile * 2 &&
      mouseY >= ey &&
      mouseY <= ey + tile * 2
    ) {
      selected = e;
      break;
    }
  }

});
// start population
for (let i = 0; i < 25; i++) {
  entities.push(
    spawnEntity(
      Math.floor(Math.random() * gridSize),
      Math.floor(Math.random() * gridSize),
      20 + Math.random() * 20
    )
  );
}

// ======================
// MOVE
// ======================
function move(e) {

  let dirs = [
    [1,0],
    [-1,0],
    [0,1],
    [0,-1]
  ];

  if (Math.random() < 0.7) {

    let bestX = e.x;
    let bestY = e.y;
    let bestFood = food[e.y][e.x];

    for (let d of dirs) {

      let nx = e.x + d[0];
      let ny = e.y + d[1];

      if (nx < 0 || ny < 0 || nx >= gridSize || ny >= gridSize)
        continue;

      if (food[ny][nx] > bestFood) {
        bestFood = food[ny][nx];
        bestX = nx;
        bestY = ny;
      }
    }

    e.x = bestX;
    e.y = bestY;

  } else {

    let d = dirs[Math.floor(Math.random() * dirs.length)];

    e.x += d[0];
    e.y += d[1];

    if (e.x < 0) e.x = 0;
    if (e.y < 0) e.y = 0;
    if (e.x >= gridSize) e.x = gridSize - 1;
    if (e.y >= gridSize) e.y = gridSize - 1;
  }
}

// ======================
// LOOP
// ======================
function loop() {

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // draw food
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      ctx.fillStyle = food[y][x] > 0 ? "#2ecc71" : "#0b2a4a";
      ctx.fillRect(x * tile, y * tile, tile, tile);
    }
  }

  let alive = [];

  for (let e of entities) {

   e.age += 0.01;

// energy system
e.energy -= 0.02;

    // eat
    if (food[e.y][e.x] > 0) {
      e.energy += 1;
      food[e.y][e.x] -= 0.5;
    }

    // movement
    move(e);

    // reproduction (stable)
    if (e.energy > 30) {
      e.energy -= 10;

      alive.push(spawnEntity(e.x, e.y, 15));
    }

// death check
if (e.energy > 0) {
  alive.push(e);
}

// DRAW ENTITY
ctx.fillStyle = "red";
ctx.fillRect(
  e.x * tile,
  e.y * tile,
  tile * 2,
  tile * 2
);
  }

  entities = alive;

  // emergency respawn if extinction happens
  if (entities.length === 0) {
    for (let i = 0; i < 20; i++) {
      entities.push(
        spawnEntity(
          Math.floor(Math.random() * gridSize),
          Math.floor(Math.random() * gridSize),
          25
        )
      );
    }
  }

  if (selected) {

  document.getElementById("ui").innerText =
`${selected.name}
Sex: ${selected.sex}
Age: ${selected.age.toFixed(1)}
Energy: ${selected.energy.toFixed(1)}
Children: ${selected.children}`;

} else {

  if (entities.length === 0) {
    document.getElementById("ui").innerText =
`God Sim

EXTINCTION EVENT`;
  } else {

    let first = entities[0];

    document.getElementById("ui").innerText =
`God Sim

Population: ${entities.length}

Name: ${first.name}
Sex: ${first.sex}
Age: ${first.age.toFixed(1)}

Food: ${food.flat().filter(f => f > 0).length}`;
  }
}

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
