<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>God Sim - Clean Base</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui">Loading simulation...</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ======================
// WORLD SETTINGS
// ======================
let x = 100;
let y = 100;
let energy = 20;

// ======================
// MAIN LOOP
// ======================
function loop(){

  // clear screen
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // simple movement
  x += 1;

  // energy system (survival pressure)
  energy -= 0.03;

  // death / respawn
  if(energy <= 0){
    x = 100;
    y = 100;
    energy = 20;
  }

  // draw entity
  ctx.fillStyle = "white";
  ctx.fillRect(x,y,10,10);

  // UI
  document.getElementById("ui").innerText =
`God Sim Base Engine

Entity Position: (${x.toFixed(0)}, ${y.toFixed(0)})
Energy: ${energy.toFixed(1)}
Status: ${energy > 0 ? "Alive" : "Respawning"}`;

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
